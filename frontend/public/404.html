<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>MB Consulting</title>
    <script>
      // Redirect per SPA su GitHub Pages
      // Quando GitHub Pages non trova la pagina, reindirizza qui
      // e noi rimandiamo all'index con il percorso corretto
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/?/' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
